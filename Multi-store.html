document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4ab10741-06d2-422b-8527-68b7d68f6286\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n\n\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  .lk-num { font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\"; }\n  .lk-scroll::-webkit-scrollbar { height: 10px; width: 10px; }\n  .lk-scroll::-webkit-scrollbar-thumb { background: #d4d8dd; border-radius: 6px; border: 2px solid #fff; }\n  .lk-scroll::-webkit-scrollbar-track { background: transparent; }\n  @keyframes lkFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"display:flex; height:100vh; width:100%; background:#f4f5f7; font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif; color:#1c1f23; overflow:hidden;\">\n\n  <!-- ===== Sidebar ===== -->\n  <aside style=\"width:212px; flex:0 0 212px; background:#fff; border-right:1px solid #eceef1; display:flex; flex-direction:column; padding:18px 0;\">\n    <div style=\"display:flex; align-items:center; gap:8px; padding:0 20px 22px;\">\n      <span style=\"font-size:23px; font-weight:800; letter-spacing:-.5px; color:#111;\">linko<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:3px; font-size:11px; background:#f1f2f4; border-radius:5px; padding:2px 7px; color:#6b7280;\">♪ 抖音<\u002Fspan>\n    <\u002Fdiv>\n\n    <nav style=\"display:flex; flex-direction:column; gap:2px; padding:0 12px;\">\n      <div style=\"display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:8px; font-size:13.5px; color:#6b7280; cursor:pointer;\">\n        <span style=\"width:22px; height:22px; border-radius:6px; background:#eef0f3; display:inline-flex; align-items:center; justify-content:center; font-size:12px;\">👤<\u002Fspan>达人管理\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:8px; font-size:13.5px; color:#6b7280; cursor:pointer;\">\n        <span style=\"width:22px; height:22px; border-radius:6px; background:#eef0f3; display:inline-flex; align-items:center; justify-content:center; font-size:12px;\">📁<\u002Fspan>项目管理\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:8px; font-size:13.5px; color:#111; font-weight:600; background:#f5f6f8; cursor:pointer;\">\n          <span style=\"width:22px; height:22px; border-radius:6px; background:#111; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:12px;\">📊<\u002Fspan>数据监控\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; padding:4px 0 4px 42px; gap:1px;\">\n          <div style=\"font-size:13px; color:#111; font-weight:600; background:#eef1ff; padding:7px 10px; border-radius:7px; cursor:pointer;\">多店铺进度报表<\u002Fdiv>\n          <div style=\"font-size:13px; color:#6b7280; padding:7px 10px; border-radius:7px; cursor:pointer;\">单项目进度报表<\u002Fdiv>\n          <div style=\"font-size:13px; color:#6b7280; padding:7px 10px; border-radius:7px; cursor:pointer;\">单项目数据源<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:8px; font-size:13.5px; color:#6b7280; cursor:pointer;\">\n        <span style=\"width:22px; height:22px; border-radius:6px; background:#eef0f3; display:inline-flex; align-items:center; justify-content:center; font-size:12px;\">⚙️<\u002Fspan>系统配置\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <div style=\"margin-top:auto; padding:0 12px; display:flex; flex-direction:column; gap:2px;\">\n      <div style=\"font-size:13px; color:#9aa1aa; padding:9px 10px;\">帮助中心<\u002Fdiv>\n      <div style=\"font-size:13px; color:#9 \"font-size:13px; color:{{ tc.labelColor }};\">{{ tc.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- table -->\n      <div class=\"lk-scroll\" style=\"background:#fff; border:1px solid #eceef1; border-radius:14px; margin-top:14px; overflow:auto; max-height:calc(100vh - 260px);\">\n        <sc-if value=\"{{ isRegularView }}\" hint-placeholder-val=\"{{ true }}\">\n          \n            {{ theadEl }}\n            {{ tbodyEl }}\n          <table class=\"lk-num\" style=\"border-collapse:collapse; width:100%; min-width:1180px; font-size:13px;\"><\u002Ftable>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isRowspanView }}\" hint-placeholder-val=\"{{ false }}\">\n          \n            {{ rsTheadEl }}\n            {{ rsTbodyEl }}\n          <table class=\"lk-num\" style=\"border-collapse:collapse; width:100%; font-size:13px;\"><\u002Ftable>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- ===== Glossary modal ===== -->\n  <sc-if value=\"{{ glossaryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeGlossary }}\" style=\"position:fixed; inset:0; background:rgba(17,20,24,.42); display:flex; align-items:center; justify-content:center; z-index:50;\">\n      <div onclick=\"{{ stop }}\" style=\"width:680px; max-height:82vh; background:#fff; border-radius:16px; box-shadow:0 24px 60px rgba(0,0,0,.22); display:flex; flex-direction:column; animation:lkFade .22s ease; overflow:hidden;\">\n        <!-- header -->\n        <div style=\"padding:22px 26px 16px; border-bottom:1px solid #eceef1; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;\">\n          <div>\n            <div style=\"font-size:17px; font-weight:700; color:#1c1f23;\">指标说明<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#9aa1aa; margin-top:3px;\">报表所有字段的定义与计算口径<\u002Fdiv>\n \u002Fdiv>\n        <div style=\"font-size:13px; color:#9aa1aa; margin-bottom:20px;\">将按当前筛选条件生成 Excel<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:11px; font-size:13.5px; color:#374151;\">\n          <div style=\"display:flex; justify-content:space-between;\"><span style=\"color:#9aa1aa;\">店铺归属<\u002Fspan><span style=\"font-weight:600;\">{{ exportProjects }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between;\"><span style=\"color:#9aa1aa;\">时间<\u002Fspan><span style=\"font-weight:600;\">{{ exportTime }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between;\"><span style=\"color:#9aa1aa;\">商务 POC / 达人详情<\u002Fspan><span style=\"font-weight:600;\">{{ exportDrill }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between;\"><span style=\"color:#9aa1aa;\">数据行数<\u002Fspan><span style=\"font-weight:600;\">{{ exportRows }} 行<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; margin-top:24px;\">\n          <button onclick=\"{{ closeExport }}\" style=\"flex:1; height:40px; border:1px solid #e2e5e9; background:#fff; border-radius:10px; font-size:14px; cursor:pointer; font-family:inherit; color:#374151;\">取消<\u002Fbutton>\n          <button onclick=\"{{ closeExport }}\" style=\"flex:1; height:40px; border:none; background:#111; color:#fff; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;\">确认导出<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    data: null, projMap: {},\n    dim: \"GMV\",\n    tableTab: \"brand\",\n    // 新筛选\n    projDropOpen: false,\n    projSel: \"ALL\",\n    brandDropOpen: false,\n    brandSel: [],\n    brandSearch: \"\",\n    monthStart: \"2025-05\",\n    monthEnd: \"2025-06\",\n    monthDropOpen: false,\n    exportOpen: false,\n    glossaryOpen: false,\n    dimsMenuOpen: false,\n    customDims: [\"CGSV\", \"CGMV\"],\n    customCols: [\"target\",\"ctd\",\"ctdAch\",\"ctdYoy\",\"ctg\",\"cons\",\"consAch\",\"consYoy\",\"nego\",\"opt\",\"optAch\"],\n    customTalentCols: [],\n    showFullName: false,\n\n  };\n\n  componentDidMount() {\n    const BRAND_FULL = {\"BS\":\"芭比布朗\",\"CPB\":\"CPB 肌肤之钥\",\"CT\":\"Charlotte Tilbury\",\"3CE\":\"3CE彩妆\",\"希尔顿\":\"希尔顿全球酒店礼遇\",\"GUE\":\"GUERLAIN娇兰\",\"LRL\":\"L'Oréal Paris巴黎欧莱雅\",\"NARS\":\"NARS彩妆\",\"IPSA\":\"茵芙莎\",\"雅顿\":\"伊丽莎白雅顿\",\"CHC\":\"CHC时装\",\"CLB\":\"Club Med地中海俱乐部\",\"Pola\":\"POLA宝丽\",\"贝亲（抖音）\":\"贝亲官方旗舰店（抖音）\",\"贝亲（视频号）\":\"贝亲官方旗舰店（视频号）\",\"大王\":\"大王纸品\",\"Lamer\":\"La Mer海蓝之谜\",\"珂润\":\"珂润护肤\",\"乐而雅\":\"乐而雅官方旗舰\",\"碧柔\":\"碧柔护肤\",\"视频号（美妆）\":\"其信视频号美妆矩阵\",\"力士\":\"力士个护\"};\n    const RAW = [\n      [\"DL\",\"BS\",70000000,70520000,4200000,1800000,0.62],\n      [\"DL\",\"CPB\",49000000,78249032,0,0,0.65],\n      [\"DL\",\"CT\",10000000,17796406,0,0,0.60],\n      [\"DL\",\"3CE\",8500000,3720000,1260000,970000,1.05],\n      [\"DL\",\"希尔顿\",4050000,2895350,2250000,750000,0.55],\n      [\"DL\",\"GUE\",15000000,2895350,0,620000,0.42,true],\n      [\"DL\",\"LRL\",8000000,10900718,0,0,0.58],\n      [\"DL\",\"NARS\",17190000,19909670,0,0,0.58],\n      [\"DL\",\"IPSA\",4600000,3849220,1125000,0,0.72],\n      [\"DL\",\"雅顿\",4600000,3849220,1125000,0,0.72],\n      [\"QX\",\"CHC\",1228000,1451747,330000,70000,0.65],\n      [\"QX\",\"CLB\",1045278,2372857,150000,0,0.66],\n      [\"QX\",\"Pola\",3500000,4314163,40000,30000,0.67],\n      [\"QX\",\"贝亲（抖音）\",21000000,11380000,700000,140000,0.73],\n      [\"QX\",\"贝亲（视频号）\",113000,23000,0,6000,0.83],\n      [\"QX\",\"大王\",25000,23000,8000,0,0.65,true],\n      [\"QX\",\"Lamer\",69000000,95440000,800000,0,0.85],\n      [\"QX\",\"珂润\",1634850,1149700,220000,30000,1.00],\n      [\"QX\",\"乐而雅\",261000,181400,100000,15000,1.00,true],\n      [\"QX\",\"碧柔\",449360,417000,107000,81000,1.00],\n      [\"QX\",\"视频号（美妆）\",3525000,424000,180000,200000,1.00],\n      [\"QX\",\"力士\",750000,251000,250000,15000,1.00],\n    ];\n    const POC_NAMES = [\"王思远\",\"李蔓\",\"陈一鸣\",\"赵晓\",\"周航\",\"孙悦\",\"吴桐\",\"郑凯\"];\n    const TALENT = [\"东方甄选\",\"广东夫妇\",\"陈赫严选\",\"琦儿Leo\",\"潘雨润\",\"蜜蜜的奇妙世界\",\"张凯毅\",\"程十安\"];\n    const TALENT_DOUYIN = [\"@dongfangzhenxuan\",\"@guangdongfufu\",\"@chenheyaxuan\",\"@qier_leo\",\"@panyurun\",\"@mimiqimiao\",\"@zhangkaiyi\",\"@chengshinan\"];\n    const TALENT_UID = [\"3245868612038515\",\"5143678901234567\",\"2098765432109876\",\"6712345678901234\",\"4456789012345678\",\"1234567890123456\",\"7890123456789012\",\"3344556677889900\"];\n    const dv = (tgt,ctd,ctg,neg) => { const cons=ctd+ctg,opt=ctd+ctg+neg; return {target:tgt,ctd,ctg,nego:neg,cons,opt,ctdAch:tgt?ctd/tgt:null,consAch:tgt?cons/tgt:null,optAch:tgt?opt/tgt:null,ctdYoy:0.6+(ctd%97)/97*0.9}; };\n    const ROWS = RAW.map((r,i) => {\n      const [project,brand,gTgt,gCtd,gCtg,gNeg,f,emptyPoc] = r;\n      const GMV=dv(gTgt,gCtd,gCtg,gNeg),GSV=dv(gTgt,Math.round(gCtd*f),Math.round(gCtg*f),Math.round(gNeg*f)),NSO=dv(Math.round(gTgt*0.92),Math.round(gCtd*f*0.92),Math.round(gCtg*f*0.92),Math.round(gNeg*f*0.92));\n      const n=2+(i%2);const pocs=[];let remCtd=gCtd,remCtg=gCtg,remNeg=gNeg;\n      for(let k=0;k<n;k++){const last=k===n-1,w=last?1:(k===0?0.6:0.3);const cCtd=last?remCtd:Math.round(gCtd*w),cCtg=last?remCtg:Math.round(gCtg*w),cNeg=last?remNeg:Math.round(gNeg*w);remCtd-=cCtd;remCtg-=cCtg;remNeg-=cNeg;const name=(emptyPoc&&k===0)?\"\":POC_NAMES[(i+k)%POC_NAMES.length];pocs.push({name,GMV:dv(0,cCtd,cCtg,cNeg),GSV:dv(0,Math.round(cCtd*f),Math.round(cCtg*f),Math.round(cNeg*f)),NSO:dv(0,Math.round(cCtd*f*0.92),Math.round(cCtg*f*0.92),Math.round(cNeg*f*0.92)),talents:[0,1,2].map(t=>{const tw=[0.5,0.3,0.2][t];return{name:TALENT[(i+k+t)%TALENT.length],douyinId:TALENT_DOUYIN[(i+k+t)%TALENT_DOUYIN.length],uid:TALENT_UID[(i+k+t)%TALENT_UID.length],GMV:dv(0,Math.round(cCtd*tw),Math.round(cCtg*tw),Math.round(cNeg*tw)),GSV:dv(0,Math.round(cCtd*f*tw),Math.round(cCtg*f*tw),Math.round(cNeg*f*tw)),NSO:dv(0,Math.round(cCtd*f*0.92*tw),Math.round(cCtg*f*0.92*tw),Math.round(cNeg*f*0.92*tw))};})});}\n      const talents=[0,1,2,3].map(t=>{const tw=[0.42,0.28,0.18,0.12][t],cd=Math.round(gCtd*tw),cg=Math.round(gCtg*tw),ng=Math.round(gNeg*tw);return{name:TALENT[(i+t)%TALENT.length],douyinId:TALENT_DOUYIN[(i+t)%TALENT_DOUYIN.length],uid:TALENT_UID[(i+t)%TALENT_UID.length],GMV:dv(0,cd,cg,ng),GSV:dv(0,Math.round(cd*f),Math.round(cg*f),Math.round(ng*f)),NSO:dv(0,Math.round(cd*f*0.92),Math.round(cg*f*0.92),Math.round(ng*f*0.92))};});\n      return {id:\"b\"+i,project,brand,brandFull:BRAND_FULL[brand]||brand,GMV,GSV,NSO,pocs,talents};\n    });\n    this.setState({ data: ROWS, projMap: { DL: \"多啦\", QX: \"其信\" } });\n  }\n\n  // ---- formatting ----\n  fmtMoney(v) {\n    if (v === null || v === undefined) return \"—\";\n    if (v === 0) return \"0\";\n    const abs = Math.abs(v);\n    if (abs >= 1e8) return (v / 1e8).toFixed(2) + \"亿\";\n    if (abs >= 1e4) return (v / 1e4).toFixed(1) + \"万\";\n    return Math.round(v).toLocaleString();\n  }\n  achColor(a) {\n    if (a === null || a === undefined) return \"#c2c7ce\";\n    if (a >= 1) return \"#16a34a\";\n    if (a >= 0.8) return \"#d97706\";\n    return \"#dc2626\";\n  }\n  pct(a) {\n    if (a === null || a === undefined) return \"—\";\n    return Math.round(a * 100) + \"%\";\n  }\n  yoy(r) {\n    if (r === null || r === undefined) return \"—\";\n    const d = (r - 1) * 100;\n    return (d >= 0 ? \"+\" : \"\") + d.toFixed(0) + \"%\";\n  }\n  yoyColor(r) {\n    if (r === null || r === undefined) return \"#c2c7ce\";\n    return r >= 1 ? \"#16a34a\" : \"#dc2626\";\n  }\n\n  // 含券维度由基础维度按系数派生（含平台券 ≥ 不含券）\n  getDim(obj, dim) {\n    if (dim === \"CGMV\") return this.scaleDim(obj.GMV, 1.08);\n    if (dim === \"CGSV\") return this.scaleDim(obj.GSV, 1.06);\n    return obj[dim];\n  }\n  scaleDim(d, f) {\n    const s = (v) => Math.round(v * f);\n    const o = { target: s(d.target), ctd: s(d.ctd), ctg: s(d.ctg), nego: s(d.nego), cons: s(d.cons), opt: s(d.opt), ctdYoy: d.ctdYoy };\n    o.ctdAch = o.target ? o.ctd / o.target : null;\n    o.consAch = o.target ? o.cons / o.target : null;\n    o.optAch = o.target ? o.opt / o.target : null;\n    return o;\n  }\n\n  sumDim(rows, dim) {\n    const acc = { target: 0, ctd: 0, ctg: 0, nego: 0, cons: 0, opt: 0 };\n    let yoyW = 0, yoyN = 0;\n    rows.forEach((b) => {\n      const d = this.getDim(b, dim);\n      acc.target += d.target; acc.ctd += d.ctd; acc.ctg += d.ctg;\n      acc.nego += d.nego; acc.cons += d.cons; acc.opt += d.opt;\n      yoyW += d.ctdYoy * d.ctd; yoyN += d.ctd;\n    });\n    acc.ctdAch = acc.target ? acc.ctd / acc.target : null;\n    acc.consAch = acc.target ? acc.cons / acc.target : null;\n    acc.optAch = acc.target ? acc.opt / acc.target : null;\n    acc.ctdYoy = yoyN ? yoyW / yoyN : null;\n    return acc;\n  }\n\n  // 11 列定义（全集）\n  allColDefs(d, isFirst) {\n    const sep = isFirst ? \"transparent\" : \"#d1d5db\";\n    const none = \"none\";\n    const hiBg = \"#f4f7fb\";\n    const m = (v, extra) => ({ cellValue: this.fmtMoney(v), color: \"#1c1f23\", weight: \"400\", bg: \"transparent\", sep: none, ...extra });\n    return {\n      target:  { ...m(d.target,  { color: \"#6b7280\", sep }) },\n      ctd:     { ...m(d.ctd,     { weight: \"600\" }) },\n      ctdAch:  { cellValue: this.pct(d.ctdAch),  color: this.achColor(d.ctdAch),  weight: \"700\", bg: \"transparent\", sep: none },\n      ctdYoy:  { cellValue: this.yoy(d.ctdYoy),  color: this.yoyColor(d.ctdYoy),  weight: \"500\", bg: \"transparent\", sep: none },\n      ctg:     { ...m(d.ctg,     { color: \"#6b7280\" }) },\n      cons:    { ...m(d.cons,    { bg: hiBg }) },\n      consAch: { cellValue: this.pct(d.consAch), color: this.achColor(d.consAch), weight: \"700\", bg ate({ dimsMenuOpen: false }),\n      // 店铺归属\n      projLabel, projDropItems,\n      projDropOpen: S.projDropOpen,\n      toggleProjDrop: () => this.setState((s) => ({ projDropOpen: !s.projDropOpen, brandDropOpen: false, monthDropOpen: false, dimsMenuOpen: false })),\n      closeProjDrop: () => this.setState({ projDropOpen: false }),\n      // 店铺多选\n      brandLabel, brandDropItems, brandSelCount,\n      brandSearch: S.brandSearch,\n      onBrandSearch: (e) => this.setState({ brandSearch: e.target.value }),\n      clearBrands,\n      brandDropOpen: S.brandDropOpen,\n      toggleBrandDrop: () => this.setState((s) => ({ brandDropOpen: !s.brandDropOpen, projDropOpen: false, monthDropOpen: false, dimsMenuOpen: false })),\n      closeBrandDrop: () => this.setState({ brandDropOpen: false }),\n      // 时间\n      monthLabel, leftGrid, rightGrid, panelYear, prevYear, nextYear,\n      monthDropOpen: S.monthDropOpen,\n      toggleMonthDrop: () => this.setState((s) => ({ monthDropOpen: !s.monthDropOpen, projDropOpen: false, brandDropOpen: false, dimsMenuOpen: false, monthPicking: \"start\" })),\n      closeMonthDrop: () => this.setState({ monthDropOpen: false, monthPicking: \"start\" }),\n\n      openGlossary: () => this.setState({ glossaryOpen: true }),\n      closeGlossary: () => this.setState({ glossaryOpen: false }),\n      glossaryOpen: S.glossaryOpen,\n      glossarySections: [\n        { title: \"实际达成\", items: [\n          { name: \"目标\", tag: \"人工维护\", desc: \"本时间窗内该店铺/项目的 GMV / GSV 等预设目标值，由商务团队在 Linko 年度预估模块手动录入。\" },\n          { name: \"CTD 实际\", tag: \"抖店订单\", desc: \"Cut-To-Date，截止当前日期的累计实际成交金额，数据来源于抖店订单明细，T-1 更新。\" },\n          { name: \"CTD Ach%\", tag: \"计算\", desc: \"CTD 达成率 = CTD 实际 ÷ 目标。\" },\n          { name: \"CTD YOY\", tag: \"计算\", desc: \"同比增长率 = 本期 CTD ÷ 去年同口径 CTD - 1。同比口径取去年截止目标日的数据。\" },\n        ]},\n        { title: \"保守预估\", items: [\n          { name: \"CTG 已确认\", tag: \"人工维护\", desc: \"Committed To Go，已确认将上播且合同/口头确认的待合作达人 GMV，由商务手动录入。\" },\n
